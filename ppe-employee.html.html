<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เบิกอุปกรณ์ PPE</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4ff;--surface:#ffffff;--border:#dde3f0;
    --accent:#2563eb;--accent-light:#eff4ff;
    --green:#16a34a;--green-light:#f0fdf4;
    --red:#dc2626;--text:#1e2340;--muted:#6b7280;
    --shadow:0 4px 24px rgba(37,99,235,0.10);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .topbar{background:linear-gradient(135deg,#1d4ed8,#2563eb);color:white;padding:18px 0;text-align:center;box-shadow:0 2px 12px rgba(37,99,235,0.25);}
  .topbar h1{font-family:'IBM Plex Sans Thai',sans-serif;font-size:20px;font-weight:700;}
  .topbar p{font-size:13px;opacity:0.8;margin-top:3px;}
  .container{max-width:600px;margin:32px auto;padding:0 16px;}
  .card{background:var(--surface);border-radius:16px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:20px;overflow:hidden;}
  .card-head{background:var(--accent-light);padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
  .card-head-title{font-size:15px;font-weight:600;color:var(--accent);}
  .card-body{padding:20px;}
  .form-label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500;}
  .form-input,.form-select{width:100%;background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Sarabun',sans-serif;font-size:15px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
  .form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.12);}
  .form-select option{background:white;}
  .row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  .mb14{margin-bottom:14px;}
  .items-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px;}
  .item-row{background:#f8faff;border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;display:grid;grid-template-columns:1fr 90px 32px;gap:10px;align-items:center;}
  .item-row:focus-within{border-color:var(--accent);}
  .item-row select,.item-row input{background:transparent;border:none;font-family:'Sarabun',sans-serif;font-size:14px;color:var(--text);outline:none;width:100%;}
  .item-row select option{background:white;}
  .col-label{font-size:10px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px;}
  .btn-remove{background:none;border:none;cursor:pointer;color:#f87171;font-size:18px;line-height:1;transition:color 0.2s;}
  .btn-remove:hover{color:var(--red);}
  .btn-add{width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--border);background:transparent;color:var(--accent);font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;}
  .btn-add:hover{background:var(--accent-light);border-color:var(--accent);}
  .btn-submit{width:100%;padding:15px;border-radius:12px;border:none;background:linear-gradient(135deg,#2563eb,#4f46e5);color:white;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,0.3);transition:all 0.2s;margin-top:6px;}
  .btn-submit:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,99,235,0.4);}
  .btn-submit:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
  .success-screen{display:none;text-align:center;padding:48px 20px;}
  .success-screen.show{display:block;}
  .success-icon{width:80px;height:80px;background:var(--green-light);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 20px;animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  @keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .success-title{font-size:22px;font-weight:700;color:var(--green);margin-bottom:8px;}
  .success-sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
  .summary-box{background:#f8faff;border:1px solid var(--border);border-radius:12px;padding:16px;text-align:left;margin-bottom:24px;}
  .summary-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;border-bottom:1px solid var(--border);}
  .summary-row:last-child{border-bottom:none;}
  .summary-label{color:var(--muted);}
  .summary-val{font-weight:600;}
  .btn-new{padding:12px 32px;border-radius:10px;border:1.5px solid var(--accent);background:white;color:var(--accent);font-family:'Sarabun',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .btn-new:hover{background:var(--accent-light);}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--red);color:white;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,0.2);z-index:100;transition:transform 0.3s;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.8);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px;font-size:15px;color:var(--accent);font-weight:500;}
  .spinner{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .footer{text-align:center;color:var(--muted);font-size:12px;padding:16px;}
</style>
</head>
<body>

<div class="topbar">
  <h1>🦺 เบิกอุปกรณ์ PPE</h1>
  <p>กรอกข้อมูลให้ครบถ้วนก่อนยืนยัน</p>
</div>

<div class="container">
  <div id="form-section">
    <div class="card">
      <div class="card-head"><span>👤</span><span class="card-head-title">ข้อมูลผู้เบิก</span></div>
      <div class="card-body">
        <div class="row-2">
          <div>
            <label class="form-label">วันที่</label>
            <input class="form-input" type="date" id="req-date" />
          </div>
          <div>
            <label class="form-label">แผนก</label>
            <select class="form-select" id="req-dept">
              <option value="">-- เลือกแผนก --</option>
              <option>Line 1</option>
              <option>Line 2</option>
            </select>
          </div>
        </div>
        <div class="mb14">
          <label class="form-label">ชื่อ-สกุล</label>
          <input class="form-input" id="req-name" placeholder="กรอกชื่อ-นามสกุล" />
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-head"><span>📦</span><span class="card-head-title">รายการอุปกรณ์ที่เบิก</span></div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 90px 32px;gap:10px;padding:0 2px;margin-bottom:6px">
          <div class="col-label">อุปกรณ์ PPE</div>
          <div class="col-label">จำนวน</div>
          <div></div>
        </div>
        <div class="items-list" id="items-list"></div>
        <button class="btn-add" onclick="addRow()">＋ เพิ่มรายการ</button>
        <button class="btn-submit" id="btn-submit" onclick="submitForm()" style="margin-top:16px">✅ ยืนยันการเบิกอุปกรณ์</button>
      </div>
    </div>
  </div>

  <div class="card" id="success-section" style="display:none">
    <div class="card-body">
      <div class="success-screen show">
        <div class="success-icon">✅</div>
        <div class="success-title">บันทึกสำเร็จ!</div>
        <div class="success-sub">ข้อมูลถูกบันทึกเข้า Google Sheets แล้ว 🎉</div>
        <div class="summary-box" id="summary-box"></div>
        <button class="btn-new" onclick="resetForm()">📝 เบิกอุปกรณ์อีกครั้ง</button>
      </div>
    </div>
  </div>

  <div class="footer">ระบบเบิกอุปกรณ์ PPE &nbsp;|&nbsp; สำหรับพนักงานเท่านั้น</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SHEET_API = 'https://script.google.com/macros/s/AKfycbzsokyYZ2tRNTRicVkhHKE5MD66FeP8vkAz50TfqVVrk2DbtwU4YiI2U37P6mIdYNhjHg/exec';

const PPE_ITEMS = [
  'Ear Plug','หมวกนิรภัย','เสื้อ Safety','ถุงมือ','แว่นตานิรภัย','รองเท้านิรภัย'
];

function init() {
  document.getElementById('req-date').value = new Date().toISOString().split('T')[0];
  addRow();
}

function addRow() {
  const list = document.getElementById('items-list');
  const id = 'r'+Date.now();
  const opts = PPE_ITEMS.map(p=>`<option value="${p}">${p}</option>`).join('');
  const div = document.createElement('div');
  div.className='item-row'; div.id=id;
  div.innerHTML=`
    <div>
      <div class="col-label">อุปกรณ์</div>
      <select>${opts}</select>
    </div>
    <div style="border-left:1px solid var(--border);padding-left:10px">
      <div class="col-label">จำนวน</div>
      <input type="number" min="1" value="1" />
    </div>
    <button class="btn-remove" onclick="document.getElementById('${id}').remove()">✕</button>
  `;
  list.appendChild(div);
}

async function submitForm() {
  const date = document.getElementById('req-date').value;
  const name = document.getElementById('req-name').value.trim();
  const dept = document.getElementById('req-dept').value;
  const rows = document.querySelectorAll('#items-list .item-row');

  if(!date){ toast('กรุณาเลือกวันที่'); return; }
  if(!name){ toast('กรุณากรอกชื่อ-สกุล'); return; }
  if(!dept){ toast('กรุณาเลือกแผนก'); return; }
  if(!rows.length){ toast('กรุณาเพิ่มรายการอย่างน้อย 1 รายการ'); return; }

  const items=[]; let err=false;
  rows.forEach(row=>{
    const sel=row.querySelector('select');
    const inp=row.querySelector('input[type=number]');
    const name=sel.value;
    const qty=parseInt(inp.value)||0;
    if(qty<=0){ toast('จำนวนต้องมากกว่า 0'); err=true; return; }
    items.push({name, qty});
  });
  if(err||!items.length) return;

  // แสดง loading
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังบันทึก...';

  try {
    const d = new Date(date);
    const displayDate = d.toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});

    // ส่งข้อมูลไป Google Sheets
    await fetch(SHEET_API, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({date: displayDate, name, dept, items})
    });

    // แสดงหน้าสำเร็จ
    document.getElementById('form-section').style.display='none';
    document.getElementById('success-section').style.display='block';
    document.getElementById('summary-box').innerHTML=`
      <div class="summary-row"><span class="summary-label">วันที่</span><span class="summary-val">${displayDate}</span></div>
      <div class="summary-row"><span class="summary-label">ชื่อ-สกุล</span><span class="summary-val">${name}</span></div>
      <div class="summary-row"><span class="summary-label">แผนก</span><span class="summary-val">${dept}</span></div>
      <div class="summary-row" style="border-bottom:none;flex-direction:column;gap:6px">
        <span class="summary-label">รายการที่เบิก</span>
        ${items.map(i=>`<div style="display:flex;justify-content:space-between"><span>${i.name}</span><span class="summary-val" style="color:#2563eb">×${i.qty}</span></div>`).join('')}
      </div>
    `;
  } catch(e) {
    toast('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
    btn.disabled = false;
    btn.textContent = '✅ ยืนยันการเบิกอุปกรณ์';
  }
}

function resetForm() {
  document.getElementById('form-section').style.display='block';
  document.getElementById('success-section').style.display='none';
  document.getElementById('req-name').value='';
  document.getElementById('req-dept').value='';
  document.getElementById('req-date').value=new Date().toISOString().split('T')[0];
  document.getElementById('items-list').innerHTML='';
  document.getElementById('btn-submit').disabled=false;
  document.getElementById('btn-submit').textContent='✅ ยืนยันการเบิกอุปกรณ์';
  addRow();
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

init();
</script>
</body>
</html>
